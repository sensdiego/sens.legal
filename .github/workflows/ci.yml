name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck portal
        run: npm -w portal run check

      - name: Build portal
        run: npm -w portal run build

      - name: Build Valter docs
        run: npm -w sites/valter run build

      - name: Build Juca docs
        run: npm -w sites/juca run build

      - name: Build Leci docs
        run: npm -w sites/leci run build

      - name: Build Douto docs
        run: npm -w sites/douto run build
